name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Qt 5.15
        uses: jurplel/install-qt-action@v3
        with:
          version: '5.15.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          modules: ''
          cache: true

      - name: Download TS3 Plugin SDK
        shell: pwsh
        # TeamSpeak retired the files.teamspeak-services.com SDK CDN in 2026.
        # The official source is now github.com/teamspeak/ts3client-pluginsdk
        # (PLUGIN_API_VERSION 26). Pinned to a commit SHA for reproducibility.
        run: |
          $ErrorActionPreference = 'Stop'
          $sha = '4aa90a53aa150cbf81e13bc97e68c0431b26499f'
          $url = "https://github.com/teamspeak/ts3client-pluginsdk/archive/$sha.zip"
          $zip = Join-Path $env:RUNNER_TEMP 'ts3sdk.zip'
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath "$env:RUNNER_TEMP\ts3sdk" -Force
          $sdkRoot = Get-ChildItem "$env:RUNNER_TEMP\ts3sdk" -Directory | Select-Object -First 1
          echo "TS3_SDK_DIR=$($sdkRoot.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "TS3 SDK at: $($sdkRoot.FullName)"
          Get-ChildItem -Recurse "$($sdkRoot.FullName)\include" | Select-Object FullName

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B build `
                -G "Visual Studio 17 2022" -A x64 `
                -DTS3_SDK_DIR="$env:TS3_SDK_DIR"

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release --parallel

      - name: Stage artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifact | Out-Null
          # speakerview.dll + MSVC runtime DLLs (VCRUNTIME140*.dll, MSVCP140*.dll)
          # are all produced into build\Release by the POST_BUILD step.
          Copy-Item build\Release\*.dll           artifact\
          Copy-Item resources\speakerview.ini     artifact\
          Get-ChildItem artifact

      - name: Build .ts3_plugin installer package
        shell: pwsh
        # A .ts3_plugin is just a ZIP with:
        #   /package.ini          — plugin metadata at root
        #   /plugins/*.dll        — the plugin binary + bundled MSVC runtime
        # Renaming the ZIP to .ts3_plugin lets Windows users double-click
        # to invoke the TS3 Addon Installer instead of copying files by hand.
        run: |
          $stage = 'ts3_plugin_stage'
          New-Item -ItemType Directory -Force -Path "$stage\plugins" | Out-Null
          Copy-Item resources\speakerview.ini    "$stage\package.ini"
          Copy-Item build\Release\*.dll          "$stage\plugins\"
          $version = (Select-String -Path resources\speakerview.ini -Pattern '^\s*Version\s*=\s*(.+)$').Matches.Groups[1].Value.Trim()
          $outName = "speakerview-$version.ts3_plugin"
          # .ts3_plugin is a plain ZIP; Compress-Archive needs .zip extension, rename after.
          Compress-Archive -Path "$stage\*" -DestinationPath "artifact\speakerview.zip" -Force
          Move-Item "artifact\speakerview.zip" "artifact\$outName" -Force
          Get-ChildItem artifact

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: speakerview-windows-x64
          path: artifact/
          if-no-files-found: error
